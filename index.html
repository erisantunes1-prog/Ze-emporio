<script>
let minhaLocalizacao = null;
let listaGlobal = [];
let indiceAtual = 0;
let coordenadas = [];

// 📍 Pega localização
window.onload = function() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            minhaLocalizacao = {
                lat: position.coords.latitude,
                lon: position.coords.longitude
            };
        });
    }
};

// 🌍 Converter endereço em coordenada (OpenStreetMap)
async function geocodificar(endereco) {
    let url = "https://nominatim.openstreetmap.org/search?format=json&q=" 
              + encodeURIComponent(endereco);

    let resposta = await fetch(url);
    let dados = await resposta.json();

    if (dados.length > 0) {
        return {
            lat: parseFloat(dados[0].lat),
            lon: parseFloat(dados[0].lon)
        };
    } else {
        return null;
    }
}

// 📐 Fórmula de Haversine (distância real)
function calcularDistancia(a, b) {
    const R = 6371; // raio da terra km
    const dLat = (b.lat - a.lat) * Math.PI / 180;
    const dLon = (b.lon - a.lon) * Math.PI / 180;

    const lat1 = a.lat * Math.PI / 180;
    const lat2 = b.lat * Math.PI / 180;

    const x = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.sin(dLon/2) * Math.sin(dLon/2) *
              Math.cos(lat1) * Math.cos(lat2);

    const c = 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
    return R * c;
}

// 🚚 Gerar rota Google Maps
async function gerarRota() {
    let texto = document.getElementById("enderecos").value.trim();
    if (!texto) {
        alert("Digite os endereços primeiro!");
        return;
    }

    listaGlobal = texto.split("\n");
    indiceAtual = 0;
    coordenadas = [];

    // Geocodificar todos
    for (let endereco of listaGlobal) {
        let coord = await geocodificar(endereco);
        coordenadas.push(coord);
    }

    let origem = minhaLocalizacao 
        ? minhaLocalizacao.lat + "," + minhaLocalizacao.lon 
        : listaGlobal[0];

    let destino = listaGlobal[listaGlobal.length - 1];
    let waypoints = listaGlobal.slice(0, listaGlobal.length - 1).join("|");

    let link = "https://www.google.com/maps/dir/?api=1" +
               "&origin=" + encodeURIComponent(origem) +
               "&destination=" + encodeURIComponent(destino) +
               "&waypoints=" + encodeURIComponent(waypoints);

    document.getElementById("resultado").innerHTML =
        "<p><b>Google Maps:</b></p><a href='" + link + "' target='_blank'>" + link + "</a>";

    mostrarLista();
    atualizarPainel();
}

// 📊 Calcular KM real total
function calcularKmTotal() {
    if (coordenadas.length < 2) return 0;

    let total = 0;
    for (let i = 0; i < coordenadas.length - 1; i++) {
        if (coordenadas[i] && coordenadas[i+1]) {
            total += calcularDistancia(coordenadas[i], coordenadas[i+1]);
        }
    }
    return total;
}

// 📊 Painel
function atualizarPainel() {
    let kmEstimado = calcularKmTotal().toFixed(2);
    let tempoEstimado = Math.round(kmEstimado * 3);

    document.getElementById("painelExtra").innerHTML =
        "<h3>📊 Resumo da Rota</h3>" +
        "Total de Entregas: <b>" + listaGlobal.length + "</b><br>" +
        "KM estimado real: <b>" + kmEstimado + " km</b><br>" +
        "Tempo estimado: <b>" + tempoEstimado + " min</b>";
}

// 🔄 Otimizar por vizinho mais próximo
function otimizarOrdem() {
    if (coordenadas.length < 2) return;

    let novaLista = [];
    let novasCoords = [];

    let restante = coordenadas.map((c, i) => ({
        coord: c,
        endereco: listaGlobal[i]
    }));

    let atual = restante.shift();
    novaLista.push(atual.endereco);
    novasCoords.push(atual.coord);

    while (restante.length > 0) {
        let menorIndex = 0;
        let menorDist = calcularDistancia(atual.coord, restante[0].coord);

        for (let i = 1; i < restante.length; i++) {
            let dist = calcularDistancia(atual.coord, restante[i].coord);
            if (dist < menorDist) {
                menorDist = dist;
                menorIndex = i;
            }
        }

        atual = restante.splice(menorIndex, 1)[0];
        novaLista.push(atual.endereco);
        novasCoords.push(atual.coord);
    }

    listaGlobal = novaLista;
    coordenadas = novasCoords;
    indiceAtual = 0;

    mostrarLista();
    atualizarPainel();
}
</script>
